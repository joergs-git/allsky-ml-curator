# XcodeGen project definition — run `xcodegen generate` to produce
# AllskyMLCurator.xcodeproj (gitignored).
#
# Mirrors the sibling AstroTriage-blinkV2 project to keep tooling consistent.

name: AllskyMLCurator
options:
  bundleIdPrefix: com.joergsflow
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

schemes:
  AllskyMLCurator:
    build:
      targets:
        AllskyMLCurator: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AllskyMLCuratorTests

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.4.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  AllskyMLCurator:
    type: application
    platform: macOS
    sources:
      - path: AllskyMLCurator
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joergsflow.AllskyMLCurator
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: AllskyMLCurator/Info.plist
        CURRENT_PROJECT_VERSION: 19
        MARKETING_VERSION: "0.7.1"
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: AllskyMLCurator/AllskyMLCurator.entitlements

  AllskyMLCuratorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: AllskyMLCurator
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.joergsflow.AllskyMLCuratorTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AllskyMLCurator.app/Contents/MacOS/AllskyMLCurator"
